name: Build iOS IPA with Agora

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Show Xcode SDKs
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Download iOS platform
        run: |
          sudo xcodebuild -downloadPlatform iOS || true
          xcodebuild -showsdks

      - name: Install signing certificate
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$GITHUB_WORKSPACE/.github/certs/build_certificate.p12"
          PP_PATH="$GITHUB_WORKSPACE/.github/certs/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          ls -la "$GITHUB_WORKSPACE/.github/certs"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "Installed profile UUID: $UUID"

      - name: Patch app signing only
        run: |
          ruby <<'RUBY'
          path = "iOS/AngelLive.xcodeproj/project.pbxproj"
          text = File.read(path)

          text.gsub!(/PRODUCT_BUNDLE_IDENTIFIER = [^;]+;/, "PRODUCT_BUNDLE_IDENTIFIER = app.cabbage6876.seaweed9280;")
          text.gsub!(/DEVELOPMENT_TEAM = [^;]+;/, "DEVELOPMENT_TEAM = 9W5PQNS587;")
          text.gsub!(/CODE_SIGN_STYLE = [^;]+;/, "CODE_SIGN_STYLE = Manual;")
          text.gsub!(/CODE_SIGN_IDENTITY = [^;]+;/, 'CODE_SIGN_IDENTITY = "Apple Distribution";')
          text.gsub!(/"CODE_SIGN_IDENTITY\\[sdk=iphoneos\\*\\]" = [^;]+;/, '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";')
          text.gsub!(/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/, "PROVISIONING_PROFILE_SPECIFIER = 00008130-000A74EC26F2001C93M8UP;")

          unless text.include?("PROVISIONING_PROFILE_SPECIFIER = 00008130-000A74EC26F2001C93M8UP;")
            text.gsub!(/(PRODUCT_BUNDLE_IDENTIFIER = app\.cabbage6876\.seaweed9280;)/, "\\1\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = 00008130-000A74EC26F2001C93M8UP;")
          end

          File.write(path, text)
          RUBY

      - name: Disable iCloud entitlements
        run: |
          cat > "$RUNNER_TEMP/AngelLive-NoCloud.entitlements" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          </dict>
          </plist>
          PLIST

          ruby <<'RUBY'
          path = "iOS/AngelLive.xcodeproj/project.pbxproj"
          text = File.read(path)
          text.gsub!(/CODE_SIGN_ENTITLEMENTS = AngelLive\/AngelLive\.entitlements;/, "CODE_SIGN_ENTITLEMENTS = /Users/runner/work/_temp/AngelLive-NoCloud.entitlements;")
          File.write(path, text)
          RUBY

      - name: Resolve Swift packages
        run: |
          USE_VLC=1 xcodebuild -resolvePackageDependencies \
            -workspace AngelLive.xcworkspace \
            -scheme AngelLive

      - name: Archive
        run: |
          USE_VLC=1 xcodebuild archive \
            -workspace AngelLive.xcworkspace \
            -scheme AngelLive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/AngelLive.xcarchive"

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>9W5PQNS587</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.cabbage6876.seaweed9280</key>
              <string>00008130-000A74EC26F2001C93M8UP</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AngelLive.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AngelLive-Agora-iOS-IPA
          path: ${{ runner.temp }}/export/*.ipa
