name: Build iOS IPA with Agora

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Show Xcode SDKs
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Download iOS platform
        run: |
          sudo xcodebuild -downloadPlatform iOS || true
          xcodebuild -showsdks

      - name: Install signing certificate
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$GITHUB_WORKSPACE/.github/certs/build_certificate.p12"
          PP_PATH="$GITHUB_WORKSPACE/.github/certs/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          ls -la "$GITHUB_WORKSPACE/.github/certs"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "Installed profile UUID: $UUID"

      - name: Patch app signing only
        run: |
          ruby <<'RUBY'
          path = "iOS/AngelLive.xcodeproj/project.pbxproj"
          text = File.read(path)

          profile = "00008130-000A74EC26F2001C93M8UP"
          bundle = "app.cabbage6876.seaweed9280"
          team = "9W5PQNS587"

          text.gsub!(/buildSettings = \{.*?\n\t\t\t\};/m) do |block|
            unless block.include?("PRODUCT_BUNDLE_IDENTIFIER")
              block
            else
              b = block.dup

              b.gsub!(/PRODUCT_BUNDLE_IDENTIFIER = [^;]+;/, "PRODUCT_BUNDLE_IDENTIFIER = #{bundle};")
              b.gsub!(/DEVELOPMENT_TEAM = [^;]+;/, "DEVELOPMENT_TEAM = #{team};")
              b.gsub!(/CODE_SIGN_STYLE = [^;]+;/, "CODE_SIGN_STYLE = Manual;")
              b.gsub!(/CODE_SIGN_IDENTITY = [^;]+;/, 'CODE_SIGN_IDENTITY = "Apple Distribution";')
              b.gsub!(/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = [^;]+;/, '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";')
              b.gsub!(/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/, "PROVISIONING_PROFILE_SPECIFIER = #{profile};")

              unless b.include?("DEVELOPMENT_TEAM = #{team};")
                b.sub!(/buildSettings = \{/, "buildSettings = {\n\t\t\t\tDEVELOPMENT_TEAM = #{team};")
              end

              unless b.include?("CODE_SIGN_STYLE = Manual;")
                b.sub!(/buildSettings = \{/, "buildSettings = {\n\t\t\t\tCODE_SIGN_STYLE = Manual;")
              end

              unless b.include?('CODE_SIGN_IDENTITY = "Apple Distribution";')
                b.sub!(/buildSettings = \{/, "buildSettings = {\n\t\t\t\tCODE_SIGN_IDENTITY = \"Apple Distribution\";")
              end

              unless b.include?('"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";')
                b.sub!(/buildSettings = \{/, "buildSettings = {\n\t\t\t\t\"CODE_SIGN_IDENTITY[sdk=iphoneos*]\" = \"Apple Distribution\";")
              end

              unless b.include?("PROVISIONING_PROFILE_SPECIFIER = #{profile};")
                b.sub!(/buildSettings = \{/, "buildSettings = {\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = #{profile};")
              end

              b
            end
          end

          File.write(path, text)
          RUBY

      - name: Disable iCloud entitlements
        run: |
          cat > "iOS/AngelLive/AngelLive-NoCloud.entitlements" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          </dict>
          </plist>
          PLIST

          mkdir -p "iOS/AngelLive/AngelLive"
          cp "iOS/AngelLive/AngelLive-NoCloud.entitlements" "iOS/AngelLive/AngelLive/AngelLive-NoCloud.entitlements"

          ruby <<'RUBY'
          path = "iOS/AngelLive.xcodeproj/project.pbxproj"
          text = File.read(path)

          text.gsub!(/CODE_SIGN_ENTITLEMENTS = AngelLive\/AngelLive\.entitlements;/, "CODE_SIGN_ENTITLEMENTS = AngelLive-NoCloud.entitlements;")
          text.gsub!(/CODE_SIGN_ENTITLEMENTS = AngelLive\/AngelLive-NoCloud\.entitlements;/, "CODE_SIGN_ENTITLEMENTS = AngelLive-NoCloud.entitlements;")

          File.write(path, text)
          RUBY

          ls -la "iOS/AngelLive"
          ls -la "iOS/AngelLive/AngelLive"

      - name: Debug signing settings
        run: |
          grep -n "CODE_SIGN_IDENTITY\|CODE_SIGN_STYLE\|DEVELOPMENT_TEAM\|PRODUCT_BUNDLE_IDENTIFIER\|PROVISIONING_PROFILE_SPECIFIER\|CODE_SIGN_ENTITLEMENTS" iOS/AngelLive.xcodeproj/project.pbxproj || true

      - name: Resolve Swift packages
        run: |
          USE_VLC=1 xcodebuild -resolvePackageDependencies \
            -workspace AngelLive.xcworkspace \
            -scheme AngelLive

      - name: Archive
        run: |
          USE_VLC=1 xcodebuild archive \
            -workspace AngelLive.xcworkspace \
            -scheme AngelLive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/AngelLive.xcarchive"

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>9W5PQNS587</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.cabbage6876.seaweed9280</key>
              <string>00008130-000A74EC26F2001C93M8UP</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AngelLive.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AngelLive-Agora-iOS-IPA
          path: ${{ runner.temp }}/export/*.ipa
